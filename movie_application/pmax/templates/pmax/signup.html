<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#000000,#14001f,#2b0040);
}

/* Glass Card */
form{
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.6);
  border:1px solid rgba(200,0,255,0.25);
  box-shadow:0 0 25px rgba(200,0,255,0.35);
  padding:40px;
  border-radius:15px;
  width:320px;
  text-align:center;
}

/* Heading */
h2{
  color:#d966ff;
  margin-bottom:25px;
}

/* Inputs */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  outline:none;
  border-radius:8px;
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(200,0,255,0.3);
}

/* Input focus glow */
input:focus{
  border:1px solid #d966ff;
  box-shadow:0 0 10px #d966ff;
}

/* Button */
button{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#b84dff;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#9933ff;
  box-shadow:0 0 15px #b84dff;
}

/* Error message */
p{
  margin-top:15px;
  color:#ff4d6d;
  font-weight:bold;
}

</style>


</head>

<body>

<form action="" method="post">
  {% csrf_token %}
  <h2>Signup Page</h2>

  <input type="text" placeholder="Enter username" name="username" required> <br>

  <input type="email" placeholder="Enter email" name="email" required> <br>

  <input type="password" placeholder="Enter password" name="password" required> <br>

  <button>Signup</button>

  {% if error %}
    <p>{{error}}</p>
  {% endif %}

</form>

</body>
</html>
