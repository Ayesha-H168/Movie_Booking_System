<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pmax Movies</title>
<style>
/* ===== Reset & Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: linear-gradient(135deg, #000000, #1a001f, #2d0033);
    color: #e0d8f0;
    min-height: 100vh;
}

/* ===== Navbar ===== */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    height: 75px;
    background-color: #000;
    box-shadow: 0 3px 10px rgba(0,0,0,0.6);
}

.nav h2 {
    color: #9b59b6; /* Purple accent */
}

.nav a {
    text-decoration: none;
    color: #e0d8f0;
    margin-left: 20px;
    font-weight: bold;
    transition: color 0.3s;
}

.nav a:hover {
    color: #8e44ad; /* Darker purple hover */
}

/* ===== Hero Section ===== */
.hero-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 350px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://storage.googleapis.com/kaggle-datasets-images/3653359/6344903/eccdb232f3838cba2ebbcc84181d9ed4/dataset-card.jpg?t=2023-08-22-14-23-23') center/cover no-repeat;
    text-align: center;
    margin-bottom: 40px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(155,89,182,0.3);
}

.hero-section h1 {
    font-size: 48px;
    margin-bottom: 15px;
    color:white;
    text-shadow: 0 0 10px #9b59b6;
}

.hero-section h2 {
    font-size: 24px;
    margin-bottom: 20px;
    color: #d5c3e5;
}

.hero-section button {
    padding: 12px 25px;
    font-weight: bold;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    background-color: #9b59b6;
    color: #000;
    cursor: pointer;
    transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
}

.hero-section button:hover {
    background-color: #8e44ad;
    transform: scale(1.05);
    box-shadow: 0 0 15px #9b59b6;
}

/* ===== Section Title ===== */
.section-title {
    text-align: center;
    background-color: rgba(155,89,182,0.2);
    color: white;
    padding: 10px 0;
    font-size: 28px;
    margin-bottom: 30px;
    border-radius: 8px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
}

/* ===== Movies Grid ===== */
.movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 0 30px 40px 30px;
}

/* ===== Movie Cards ===== */
.movie-card {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(155,89,182,0.2);
    box-shadow: 0 0 15px rgba(155,89,182,0.25);
}

.movie-card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    display: block;
    transition: transform 0.5s, box-shadow 0.3s;
    border-radius: 15px;
}

.movie-card:hover img {
    transform: scale(1.08);
    box-shadow: 0 0 15px #9b59b6;
}

.movie-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #9b59b6;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
    .hero-section h1 {
        font-size: 36px;
    }

    .hero-section h2 {
        font-size: 20px;
    }
}
</style>

</head>
<body>
  
    <div class="nav">
        <h2>Pmax</h2>
        <div>
            <a href="{% url 'signup'%}">Signup</a>
            <a href="{% url 'login'%}">Login</a>
        </div>
    </div>

   
    <div class="hero-section">
        <h1>🍿 Welcome to Pmax 🍿</h1>
        <h2>Browse Latest Movies 🎥</h2>
       <a href="{% url 'dashboard' %}"> <button>Browse</button></a>
    </div>


    <div class="section-title">Latest Movies</div>

   
    <div class="movies-grid">
        <div class="movie-card"><img src="https://wallpapercave.com/wp/wp16093820.jpg" alt=""></div>
        <div class="movie-card"><img src="https://www.masala.com/cloud/2025/10/20/Dhurandhar.jpeg" alt=""></div>
        <div class="movie-card"><img src="https://static.digit.in/OTT/v2/images/dia-113029.jpg?tr=w-600" alt=""></div>
        <div class="movie-card"><img src="https://wallpapercave.com/wp/wp14342059.jpg" alt=""></div>
        <div class="movie-card"><img src="https://wallpapercave.com/wp/wp11372839.jpg" alt=""></div>
        <div class="movie-card"><img src="https://cdn.moviefone.com/image-assets/645484/lMFjMrc8Bn0CQhtJDORfspXrWrK.jpg?d=360x540&q=60" alt=""></div>
       
</body>
</html>
