<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#000000,#1a0033,#330066);
  color:white;
}

.success-container{
  background:#111;
  padding:40px 50px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px rgba(194,102,255,0.4);
  max-width:400px;
}

.success-icon{
  font-size:70px;
  color:#00ff88;
  margin-bottom:20px;
}

.success-container h1{
  color:#00ff88;
  margin-bottom:10px;
}

.success-container p{
  color:#ccc;
  margin-bottom:20px;
}

.btn{
  text-decoration:none;
  background:#c266ff;
  color:white;
  padding:10px 20px;
  border-radius:8px;
  transition:0.3s;
}

.btn:hover{
  background:#a64dff;
}
    </style>
</head>
<body>
    <div class="success-container">
    <div class="success-icon">✔</div>
    <h1>Success!</h1>
    <p>Your booking was successful.</p>
    <a href="/" class="btn">Back to Dashboard</a>
</div>
</body>
</html>
